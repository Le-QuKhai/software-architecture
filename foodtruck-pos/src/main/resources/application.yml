spring:
  application:
    name: foodtruck-replenishment
  datasource:
    url: jdbc:h2:mem:foodtruck;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true   # erreichbar unter http://localhost:8080/h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate.format_sql: true
    show-sql: false

logging:
  level:
    com.foodtruck: INFO
